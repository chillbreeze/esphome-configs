esphome:
  name: environmental-indoor
  friendly_name: Environmental-indoor

esp32:
  board: m5stack-atoms3
  framework:
    type: arduino

bme68x_bsec2_i2c:
  address: 0x77
  model: bme688

uart:
  id: uart_bus
  tx_pin: GPIO7
  rx_pin: GPIO8
  baud_rate: 9600

i2c:
  sda: GPIO2
  scl: GPIO1
  scan: true

sensor:
  - platform: bme68x_bsec2
    temperature:
      name: "Temperature"
      id: temperature
      filters:
        - heartbeat: 60s
    humidity:
      name: "Humidity"
      id: humidity
      filters:
        - heartbeat: 60s
    pressure:
      name: "Pressure"
      filters:
        - heartbeat: 60s
    iaq:
      name: "IAQ"
      id: iaq
      filters:
        - heartbeat: 60s
    co2_equivalent:
      name: "CO2 Equivalent"
      filters:
        - heartbeat: 60s
    breath_voc_equivalent:
      name: "Breath VOC"
      filters:
        - heartbeat: 60s

  - platform: scd4x
    co2:
      name: "CO2"
      filters:
        - heartbeat: 60s
    temperature:
      name: "SCD4x Temperature"
      filters:
        - heartbeat: 60s
    humidity:
      name: "SCD4x Humidity"
      filters:
        - heartbeat: 60s
    update_interval: 60s

  - platform: pmsx003
    type: PMSX003
    update_interval: 60s
    pm_1_0:
      name: "Indoor PM 1.0"
      force_update: true
    pm_2_5:
      name: "Indoor PM 2.5"
      id: pm_2_5_sensor
      force_update: true
      filters:
        - heartbeat: 60s
    pm_10_0:
      name: "Indoor PM 10.0"
      id: pm_10_0_sensor
      force_update: true
      filters:
        - heartbeat: 60s

  - platform: aqi
    name: "Air Quality Index"
    pm_2_5: pm_2_5_sensor
    pm_10_0: pm_10_0_sensor
    calculation_type: AQI
    force_update: true
    filters:
      - heartbeat: 60s

  - platform: template
    name: "Dew Point"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    lambda: |-
      float T = id(temperature).state;
      float RH = id(humidity).state;
      float b = 17.67;
      float c = 243.5;
      float gamma = (b * T) / (c + T) + log(RH / 100.0);
      return (c * gamma) / (b - gamma);
    filters:
      - heartbeat: 60s
    update_interval: 60s

  - platform: template
    name: "Heat Index"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    lambda: |-
      float T = id(temperature).state;
      float RH = id(humidity).state;
      float hi = -8.78469475556 +
                  1.61139411 * T +
                  2.33854883889 * RH +
                  -0.14611605 * T * RH +
                  -0.012308094 * T * T +
                  -0.0164248277778 * RH * RH +
                  0.002211732 * T * T * RH +
                  0.00072546 * T * RH * RH +
                  -0.000003582 * T * T * RH * RH;
      return hi;
    filters:
      - heartbeat: 60s
    update_interval: 60s

  - platform: wifi_signal
    name: "Indoor Monitor WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Indoor Monitor Uptime"

text_sensor:
  - platform: bme68x_bsec2
    iaq_accuracy:
      name: "BME68x IAQ Accuracy"
  - platform: template
    name: "BME68x IAQ Classification"
    lambda: |-
      if (int(id(iaq).state) <= 50) {
        return {"Excellent"};
      } else if (int(id(iaq).state) <= 100) {
        return {"Good"};
      } else if (int(id(iaq).state) <= 150) {
        return {"Lightly polluted"};
      } else if (int(id(iaq).state) <= 200) {
        return {"Moderately polluted"};
      } else if (int(id(iaq).state) <= 250) {
        return {"Heavily polluted"};
      } else if (int(id(iaq).state) <= 350) {
        return {"Severely polluted"};
      } else {
        return {"Extremely polluted"};
      }

button:
  - platform: restart
    name: "Indoor Sensor Restart"

logger:

api:
  encryption:
    key: !secret api_encryption_key_env_indoor

  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip:
    static_ip: !secret static_ip_env_indoor
    gateway: !secret gateway
    subnet: !secret subnet
    dns1: !secret dns1
  
  power_save_mode: none

  ap:
    ssid: "Environmental-Indoor"
    password: !secret ap_password

captive_portal:
    