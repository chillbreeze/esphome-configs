esphome:
  name: environmental-outdoor
  friendly_name: Environmental-outdoor

esp32:
  board: m5stack-atoms3
  framework:
    type: arduino

uart:
  id: uart_bus
  tx_pin: GPIO7
  rx_pin: GPIO8
  baud_rate: 9600

i2c:
  - id: bus_grove
    sda: GPIO2
    scl: GPIO1
    scan: true
    frequency: 100kHz
  - id: bus_internal
    sda: GPIO38
    scl: GPIO39
    scan: true

sensor:
  - platform: sht3xd
    i2c_id: bus_grove
    temperature:
      name: "Temperature - Outdoor"
      id: temperature
      force_update: true
      filters:
        - heartbeat: 60s
    humidity:
      name: "Humidity - Outdoor"
      id: humidity
      force_update: true
      filters:
        - heartbeat: 60s
    update_interval: 60s

  - platform: qmp6988
    i2c_id: bus_grove
    pressure:
      name: "Pressure - Outdoor"
      id: pressure
    update_interval: 60s

  - platform: pmsx003
    type: PMSX003
    pm_1_0:
      name: "Outdoor PM 1.0"
    pm_2_5:
      name: "Outdoor PM 2.5"
      id: pm_2_5_sensor
    pm_10_0:
      name: "Outdoor PM 10.0"
      id: pm_10_0_sensor
      force_update: true
      filters:
        - heartbeat: 60s
    update_interval: 60s

  - platform: aqi
    name: "AQI - Outdoor"
    pm_2_5: pm_2_5_sensor
    pm_10_0: pm_10_0_sensor
    calculation_type: AQI

  - platform: template
    name: "Dew Point - Outdoor"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    lambda: |-
      float T = id(temperature).state;
      float RH = id(humidity).state;
      float b = 17.67;
      float c = 243.5;
      float gamma = (b * T) / (c + T) + log(RH / 100.0);
      return (c * gamma) / (b - gamma);
    update_interval: 60s

  - platform: template
    name: "Heat Index - Outdoor"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    lambda: |-
      float T = id(temperature).state;
      float RH = id(humidity).state;
      float hi = -8.78469475556 +
                  1.61139411 * T +
                  2.33854883889 * RH +
                  -0.14611605 * T * RH +
                  -0.012308094 * T * T +
                  -0.0164248277778 * RH * RH +
                  0.002211732 * T * T * RH +
                  0.00072546 * T * RH * RH +
                  -0.000003582 * T * T * RH * RH;
      return hi;
    update_interval: 60s

  - platform: wifi_signal
    name: "Outdoor Monitor WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Outdoor Monitor Uptime"

button:
  - platform: restart
    name: "Outdoor Sensor Restart"

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key_env_outdoor
  reboot_timeout: 5min


ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 3min
  power_save_mode: none
  
  manual_ip:
    static_ip: !secret static_ip
    gateway: !secret gateway
    subnet: !secret subnet
    dns1: !secret dns1


  ap:
    ssid: "Environmental-Outdoor"
    password: !secret ap_password

captive_portal:





