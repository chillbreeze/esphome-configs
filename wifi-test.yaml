substitutions:
  device_name: xiao-c3-antenna-test

esphome:
  name: ${device_name}

esp32:
  board: seeed_xiao_esp32c3
  variant: esp32c3
  framework:
    type: esp-idf

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: !secret test_ip

api:
  encryption:
    key: !secret api_encryption_key

# RSSI as a sensor - updates every 10s, visible in HA and logs
sensor:
  - platform: wifi_signal
    name: "Antenna Test RSSI"
    update_interval: 10s
    unit_of_measurement: dBm
    accuracy_decimals: 0
    on_value:
      then:
        - lambda: |-
            if (x > -50) {
              ESP_LOGI("antenna", "RSSI: %.0f dBm — Excellent", x);
            } else if (x > -70) {
              ESP_LOGI("antenna", "RSSI: %.0f dBm — Good", x);
            } else if (x > -85) {
              ESP_LOGI("antenna", "RSSI: %.0f dBm — Fair", x);
            } else {
              ESP_LOGI("antenna", "RSSI: %.0f dBm — Poor", x);
            }

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Antenna Test IP"
    ssid:
      name: "Antenna Test SSID"
    bssid:
      name: "Antenna Test BSSID"

binary_sensor:
  - platform: status
    name: "Antenna Test Status"